server {
	listen 80;
	resolver 10.89.0.1 ipv6=off valid=10s;
	# resolver 127.0.0.11 ipv6=off valid=10s;
	location / {
		set $frontend_upstream frontend:${FRONT_PORT};
		proxy_pass http://$frontend_upstream;
	}
	location /api/auth-register {
		set $backend_auth_upstream backend-auth:${BACK_AUTH_PORT};
		proxy_pass http://$backend_auth_upstream;
	}
	location /api/auth-login {
		set $backend_auth_upstream backend-auth:${BACK_AUTH_PORT};
		proxy_pass http://$backend_auth_upstream;
	}
	location /api/auth-logout {
		set $backend_auth_upstream backend-auth:${BACK_AUTH_PORT};
		proxy_pass http://$backend_auth_upstream;
	}
	location /api/me {
		set $backend_auth_upstream backend-auth:${BACK_AUTH_PORT};
		proxy_pass http://$backend_auth_upstream;
	}
	location /api/chatbot {
		set $backend_chatbot_upstream backend-chatbot:${BACK_CHATBOT_PORT};
		proxy_pass http://$backend_chatbot_upstream;
	}
}
