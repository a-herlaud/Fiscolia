# HTTPS server
server {
	# listen 80;
	# resolver 10.89.0.1 ipv6=off valid=10s;
	resolver 127.0.0.11 ipv6=off valid=10s;

	listen 443 ssl; # this the port that the server will listen on

	ssl_certificate  /etc/nginx/ssl/fiscolia.crt; # the path to the certificate
	ssl_certificate_key /etc/nginx/ssl/fiscolia.key; # the path to the key
	ssl_protocols TLSv1.3; # the protocol that the server will use for ssl


	location / {
		proxy_http_version 1.1;
    	proxy_set_header Upgrade $http_upgrade;
    	proxy_set_header Connection "upgrade";
		
		set $frontend_upstream frontend:${FRONT_PORT};
		proxy_pass http://$frontend_upstream;
	}
	location /api/auth-register {
		set $backend_auth_upstream backend-auth:${BACK_AUTH_PORT};
		proxy_pass http://$backend_auth_upstream;
	}
	location /api/auth-login {
		set $backend_auth_upstream backend-auth:${BACK_AUTH_PORT};
		proxy_pass http://$backend_auth_upstream;
	}
	location /api/auth-logout {
		set $backend_auth_upstream backend-auth:${BACK_AUTH_PORT};
		proxy_pass http://$backend_auth_upstream;
	}
	location /api/edit-profile {
		set $backend_auth_upstream backend-auth:${BACK_AUTH_PORT};
		proxy_pass http://$backend_auth_upstream;
	}
	location /api/me {
		set $backend_auth_upstream backend-auth:${BACK_AUTH_PORT};
		proxy_pass http://$backend_auth_upstream;
	}
	location /ws {
	    proxy_pass http://backend-chatbot:${BACK_CHATBOT_PORT};

	    proxy_http_version 1.1;
	    proxy_set_header Upgrade $http_upgrade;
	    proxy_set_header Connection "upgrade";
	    proxy_set_header Host $host;
	    proxy_read_timeout 86400;
	}
	location /kibana/ {
		proxy_pass http://fiscolia-kibana:5601;
		proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
	}
}

